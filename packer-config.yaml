builder:
  ARM_SUPPORT: true
  BUILD_CONTAINER_MEMORY_SIZE_FACTOR: 3.1
  TRUST_METADATA_ARCHITECTURE: false
  WAIT_FOR_CONTAINER: 60
  WAIT_FOR_UNLOCK_MEMORY: 60
  X86_SUPPORT: true
client:
  CLIENT_MIN_GAS_AMOUNT_TO_RESET_EXPIRATION_TIME: 1000.0
  DEV_CLIENT_POOL_SIZE: 1
  DEV_EXTERNAL_CLIENT_POOL_SIZE: 1
  MIN_SLOTS_OPEN_PER_PEER: 1
communication:
  DENEGATE_COST_REQUEST_IF_DONT_VE_THE_HASH: false
  SELF_ANNOUNCE_TO_CONNECTING_PEERS: false
  SEND_ONLY_HASHES_ASKING_COST: true
costs:
  ALLOW_GAS_DEBT: true
  BUILD_COST: 10.0
  COST_AVERAGE_VARIATION: 1
  DEFAULT_INITIAL_GAS_AMOUNT: 1000000000.0
  DEFAULT_INITIAL_GAS_AMOUNT_FACTOR: 1.0e-06
  DEV_CLIENT_GAS_AMOUNT: 1.0e+256
  EXECUTION_BENEFIT: 100.0
  EXECUTION_COST: 100.0
  FREE_GAS_THRESHOLD: 0
  FREE_TRIAL_GAS_AMOUNT: 1.0e+66
  INITIAL_PEER_DEPOSIT_FACTOR: 0.5
  INIT_COST_CONFIGURATION_FACTOR: 1
  MAINTENANCE_COST_CONFIGURATION_FACTOR: 1000000.0
  MIN_DEPOSIT_PEER: 1.0e+32
  MODIFY_RESOURCES_COST: 100.0
  SOCIALIZATION_FACTOR: 2
  TOTAL_REFILLED_DEPOSIT: 1.0e+64
  USE_DEFAULT_INITIAL_GAS_AMOUNT_FACTOR: false
dependencies:
  docker:
    BIN: /opt/nodo/bin/docker
    BUILDX_BIN: /opt/nodo/libexec/docker/cli-plugins/docker-buildx
    DAEMON_BIN: /opt/nodo/bin/dockerd
  java:
    JAVA_HOME: /opt/nodo/runtime/java/current
    RUNTIME_ROOT: /opt/nodo/runtime/java
  python:
    RUNTIME_BIN: /opt/nodo/runtime/python/current/bin/python3
    RUNTIME_ROOT: /opt/nodo/runtime/python
    VENV_BIN: /opt/nodo/venv/bin/python
  yq:
    BIN: /opt/nodo/bin/yq
general_flags:
  SIMULATE_PAYMENTS: false
  SUBMIT_NETWORK_ADDRESS_TO_REPUTATION_PROOF: true
  SUBMIT_REPUTATION_AT_INIT: false
hashing:
  CHECK_INTEGRITY_ON_SERVE: false
  HASH: sha3_256
logs:
  DEBUG_MODE: false
  MEMORY_LOGS: false
main:
  BLOCKDIR: /opt/nodo/storage/__block__/
  CACHE: /opt/nodo/storage/__cache__/
  DATABASE_FILE: /opt/nodo/storage/database.sqlite
  MAIN_DIR: /opt/nodo
  METADATA_REGISTRY: /opt/nodo/storage/__metadata__/
  REGISTRY: /opt/nodo/storage/__registry__/
  STORAGE: /opt/nodo/storage
misc:
  CONFIGURATION_REQUIRED: false
  MEMSWAP_FACTOR: 0
  MIN_BUFFER_BLOCK_SIZE: 10000000.0
  USE_PRINT: false
  VALIDATE_ON_IMPORT: true
network:
  CONSIDER_DEV_AS_INTERNAL: true
  DEFAULT_EXECUTE_REMOTE: false
  DISABLE_EXPOSE_OUTSIDE: false
  EXTERNAL_INTERFACE: ''
  FREE_PORTS_RANGE:
    - END: 60000
      START: 50000
  GATEWAY_PORT: 59598
  ISOLATE_INTERNAL_CHILDREN: true
  LOCAL_NETWORK: lo
  PUBLIC_IP: ''
packer:
  ARM_PACKER_SUPPORT: true
  PACKER_MEMORY_SIZE_FACTOR: 2.0
  SAVE_ALL: false
  X86_PACKER_SUPPORT: true
  docker:
    BUILDX_BUILDER: nodo-hostnet
    BUILDX_NETWORK: host
publisher:
  AUTO_IMPORT_SERVICE_ON_DOWNLOAD: true
  BACKOFF_SECONDS: 2
  BRANCH: main
  CHUNK_SIZE_MB: 24
  CONTENT_FORMAT: .grpcbb
  DOWNLOAD_OUTPUT_DIR: /opt/nodo/storage/published_downloads
  FALLBACK_TOKEN: ''
  FALLBACK_TOKEN_ENV_VAR: GITHUB_TOKEN
  KEEP_DOWNLOADED_FILE: true
  MAX_RETRY: 3
  PROVIDER: github
  RAW_FORMAT: .celaut
  REPOSITORY: agenticaihome/celaut-services
  SOURCE_APPLICATION_WEB_PAGE: https://reputation-systems.github.io/source-application?tab=add
  TIMEOUT_SECONDS: 300
  TOKEN_ENV_VAR: CLOUD_TOKEN
  UPLOADS_PREFIX: uploads
timing:
  CLIENT_EXPIRATION_TIME: 1200
  COMMUNICATION_ATTEMPTS: 1
  COMMUNICATION_ATTEMPTS_DELAY: 60
  EXTERNAL_COST_TIMEOUT: 10
  GENERAL_ATTEMPTS: 10
  GENERAL_WAIT_TIME: 2
  MANAGER_ITERATION_TIME: 10
  SHORT_INTERVAL_COUNT: 20
  START_SERVICE_ON_PEER_TIMEOUT: 120
virtualizers:
  DEFAULT_VIRTUALIZER: ch
  ch:
    API_SOCKET_DIR: /tmp/opt/nodo-ch
    BINARY_PATH: /opt/nodo/bin/cloud-hypervisor
    CACHE_DIR: /opt/nodo/storage/__cache__//ch
    CGROUPS_BASE_DIR: /sys/fs/cgroup
    CONSERVE_RUNTIME_DIR_ON_FAILURE: true
    CONSOLE_MODE: 'off'
    DEFAULT_MEM_MIB: 256
    GUEST_NETWORK_READY_TIMEOUT_S: 20
    GUEST_NET_DEVICE: auto
    INITRAMFS_PATHS:
      linux/amd64: /opt/nodo/cloud_hypervisor/initramfs/linux/amd64/initramfs
      linux/arm64: /opt/nodo/ch/initramfs/linux/arm64/initramfs
    KERNEL_CMDLINE_EXTRA: console=ttyS0
    KERNEL_PATHS:
      linux/amd64: /opt/nodo/cloud_hypervisor/kernels/linux/amd64/vmlinuz
      linux/arm64: /opt/nodo/ch/kernels/linux/arm64/vmlinuz
    MIN_MEM_MIB: 128
    NETWORK_BRIDGE_NAME: br-ch
    NETWORK_GATEWAY_IP: 192.168.200.1
    NETWORK_MODE: tap_bridge
    NETWORK_SUBNET: 192.168.200.0/24
    SECURITY:
      DEVICE_NODES_POLICY: deny
      DEVICE_NODE_ALLOWLIST: []
      PATH_CONFINEMENT: true
      REQUIRE_TRUSTED_SERVICE_FOR_DEVICES: true
      ROOTFS_BUILD_SANDBOX: none
      TRUSTED_SERVICE_IDS: []
    SERIAL_MODE: file
  docker:
    CONCURRENT_CONTAINER_CREATIONS: 10
    DOCKER_CLIENT_TIMEOUT: 480
    DOCKER_CONFIG_DIR: /opt/nodo/docker/config
    DOCKER_DATA_ROOT: /opt/nodo/docker/data
    DOCKER_MAX_CONNECTIONS: 1000
    DOCKER_NETWORK: docker0
    DOCKER_SOCKET: /opt/nodo/docker/docker.sock
    REMOVE_CONTAINERS: true
    SECURITY_APPARMOR_UNCONFINED: false
    SECURITY_NO_SECCOMP: false
    SECURITY_PRIVILEGED: false
    SECURITY_SELINUX_DISABLE_LABEL: false

syntax = "proto3";
package celaut;

import "buffer.proto";

// -----------------------
// CEL•AUT MESSAGES
// -----------------------

// Describes available data formats with optional tags, human-readable prose, and binary representation.
message DataFormat {
    repeated string tags = 1;
    string prose = 2;
    bytes formal = 3;
}

// Represents both, payment contracts and reputation proofs.
message Contract {
    message Ledger {
        repeated string tags = 1;
        string prose = 2;
        bytes formal = 3;
    }
    Ledger ledger = 1;
    map<string, bytes> xattrs = 2;
}

// Defines an abstract amount of gas (cost unit) as a numeric string.
message GasAmount {
    string n = 1;
}

// Associates a payment contract ledger with a gas amount (price).
message GasPrice {
    Contract contract = 1;
    GasAmount gas_amount = 2;
}

// Metadata structure with optional hashtags, data format, and reputation proofs.
message Metadata {
    message HashTag {
        message Hash {
            // Type of hash (e.g., SHA256).
            bytes type = 1;
            // Hash value bytes.
            bytes value = 2;
        }
        message AttrHashTag {
            // Field index for repeated attributes.
            int32 key = 1;
            // List of hashtags for each element in a repeated field.
            repeated HashTag value = 2;
        }
        repeated Hash hash = 1;
        repeated string tag = 2;
        repeated AttrHashTag attr_hashtag = 3;
    }
    optional HashTag hashtag = 1;
    optional DataFormat format = 2;
    repeated Contract reputation_proofs = 3;
}

// -----------------------
// SERVICE SPECIFICATION
// Defines how a service is described: API, container, network.
// -----------------------

message Service {
    // API: Defines service ports, protocols, payment contracts, and cost model.
    message Api {
        message Protocol {
            repeated string tags = 1;
            string prose = 2;
            bytes formal = 3;
        }
        message Slot {
            // Port number for this slot.
            int32 port = 1;
            // Transport protocol
            Protocol transport = 2;
            // Protocol stack definitions for this slot.
            repeated Protocol protocol_stack = 3;
            // Gas amount per declared method in protocol_stack.
            map<string, GasAmount> gas_amount_per_call = 4;
        }

        repeated Slot slot = 1;

        // Accepted payment contracts with conversion to gas.
        repeated GasPrice payment_contracts = 2;
        
        /*
         The cost of the service is measured in "gas":
           1. Initial fixed cost (one-time).
           2. Usage-based cost (variable).
         Detailed cost rules are specified within the API protocol.
        */
    }

    message Container {
        
        message Architecture {
            repeated string tags = 1;
            string prose = 2;
            bytes formal = 3;
        }
        
        message Filesystem {
            message ItemBranch {
                message Link {
                    string src = 1;
                    string dst = 2;
                }
                // Identifier for the file or folder name.
                string name = 1;
                oneof item {
                    // Raw file bytes.
                    bytes file = 2;
                    // Symbolic link.
                    Link link = 3;
                    // Nested filesystem tree.
                    Filesystem filesystem = 4;
                }
                map<string, bytes> xattrs = 5;
            }
            repeated ItemBranch branch = 1;
        }
        
        message Init {
            repeated string entry_path = 1;
            map<string, bytes> xattrs = 2;
        }

        message ConfigDeclaration {
            repeated string path = 1;
            DataFormat format = 2;
        }

        message Resources {
            // Initial system requirements.
            Sysresources at_init = 1;

            // Maximum system requirements.
            Sysresources at_most = 2;
        }
        
        // CPU architecture and environment description.
        Architecture architecture = 1;
        
        // Serialized filesystem.
        bytes filesystem = 2;
        
        // Entrypoint and startup metadata for the container.
        Init init = 3;
        
        // Container resource 
        optional Resources resources = 4;

        ConfigDeclaration config_declaration = 5;
        
        // Expected node protocol stack for internal node logic.
        repeated Api.Protocol node_protocol_stack = 6;

        // Environment variables for the execution environment.
        // (Moved here from Service.Api: env vars belong to the container that
        // runs the code, not to the communication interface.)
        map<string, DataFormat> environment_variables = 7;
    }

    // A Network is a *logical communication domain* between service
    // instances. It only describes:
    //   - which peers the service wants to communicate with (tags/prose/formal);
    //   - which protocols those peers are expected to expose (protocol_stack).
    //
    // Shared disks / VirtioFS / filesystem inheritance are NOT networks.
    // Those are an execution-environment concern expressed through
    // Container.Filesystem.ItemBranch.xattrs (see shared/guest/access).
    message Network {
        repeated string tags = 1;
        string prose = 2;
        bytes formal = 3;

        // Protocol stack expected from the peers in this communication domain.
        repeated Api.Protocol protocol_stack = 4;

        // Name of an environment variable used to filter compatible peer
        // instances during ConfigurationFile.NetworkResolution. Only peers
        // whose value for this environment variable matches the requesting
        // instance's value are returned. Empty => no env-based filtering.
        //
        // Example: many PostgreSQL instances may exist on the network, but
        // only those sharing the same value of e.g. "PG_CLUSTER" are peers.
        string environment_variable = 5;
    }

    // Natural language description.
    string prose = 1;

    // Container configuration.
    Container container = 2;
    
    // API definition.
    Api api = 3;
    
    // Network definitions.
    repeated Network network = 4;
}

message Instance {
    message Uri {
        string ip = 1;
        int32 port = 2;
    }
    message Uri_Slot {
        int32 internal_port = 1;
        repeated Uri uri = 2;
    }
    // API endpoints exposed by this instance.
    Service.Api api = 1;
    // Mapping of internal ports to external URIs.
    repeated Uri_Slot uri_slot = 2;
}

// -----------------------
// SERVICE INSTANCE CONFIGURATION
// -----------------------

message Configuration {
    // Environment variables for gateway services.
    map<string, bytes> environment_variables = 1;

    // Service specification slots.
    repeated int32 spec_slot = 2;

    // Optional initial gas deposit for service execution.
    optional GasAmount initial_gas_amount = 3;
}

message ConfigurationFile {
    message NetworkResolution {
        repeated string tags = 1;
        repeated Instance peer_instances = 2;
    }
    // Gateway instance settings.
    Instance gateway = 1;
    // Combined configuration options.
    Configuration config = 2;
    // Network discovery of peers.
    repeated NetworkResolution network_resolution = 3;
    // Initial system resource allocation for services.
    Sysresources initial_sysresources = 4;
}

// -----------------------
// SYSTEM RESOURCES
// Defines resource limits and weights for container updates.
// -----------------------

message Sysresources {
    // Block I/O weight (relative), 10–1000.
    optional uint64 blkio_weight = 1;
    // CFS CPU period in microseconds.
    optional uint64 cpu_period = 2;
    // CFS CPU quota in microseconds.
    optional uint64 cpu_quota = 3;
    // Memory limit in bytes.
    optional uint64 mem_limit = 4;
    // Disk space limit in bytes.
    optional uint64 disk_space = 5;
}

// -----------------------
// GATEWAY MESSAGES
// -----------------------

message TokenMessage {
    string token = 1;
    optional string slot = 2;
}

message EstimatedCost {
    GasAmount cost = 1;
    GasAmount init_maintenance_cost = 2;
    GasAmount max_maintenance_cost = 3;
    int32 maintenance_seconds_loop = 4;
    float variance = 5;
}

message Refund {
    GasAmount amount = 1;
}

message SignRequest {
    string public_key = 1;
    string to_sign = 2;
}

message SignResponse {
    string signed = 1;
}

message Payment {
    string deposit_token = 1;
    Contract contract = 2;
    GasAmount gas_amount = 3;
}

message Metrics {
    GasAmount gas_amount = 1;
}

message ServiceInstance {
    string token = 1;
    Instance instance = 2;
}

message Peer {
    repeated Contract reputation_proofs = 1;
    Instance instance = 2;
}

message Client {
    string client_id = 1;
}

message RecursionGuard {
    string token = 1;
}

message ModifyServiceSystemResourcesOutput {
    Sysresources sysreq = 1;
    GasAmount gas = 2;
}

message ModifyServiceSystemResourcesInput {
    Sysresources min_sysreq = 1;
    Sysresources max_sysreq = 2;
}

message ModifyGasDepositInput {
    GasAmount gas_difference = 1;
    string service_token = 2;
}

message ModifyGasDepositOutput {
    bool success = 1;
    string message = 2;
}

// -----------------------
// GATEWAY SERVICE DEFINITION
// -----------------------

service Gateway {
    rpc StartService(stream buffer.Buffer) returns (stream buffer.Buffer) {} // Configuration | Hash | Client | RecursionGuard | Service -> Instance
    rpc StopService(stream buffer.Buffer) returns (stream buffer.Buffer) {} // TokenMessage -> Refund
    rpc ModifyGasDeposit(stream buffer.Buffer) returns (stream buffer.Buffer) {} // ModifyGasDepositInput -> ModifyGasDepositOutput

    rpc GetPeerInfo(stream buffer.Buffer) returns (stream buffer.Buffer) {} //  -> Peer
    rpc IntroducePeer(stream buffer.Buffer) returns (stream buffer.Buffer) {} // Peer -> 
    rpc GenerateClient(stream buffer.Buffer) returns (stream buffer.Buffer) {} //  -> Client
    rpc GenerateDepositToken(stream buffer.Buffer) returns (stream buffer.Buffer) {} // Client -> TokenMessage
    rpc Payable(stream buffer.Buffer) returns (stream buffer.Buffer) {} // Payment -> Empty
    rpc SignPublicKey(stream buffer.Buffer) returns (stream buffer.Buffer) {} // SignRequest -> SignResponse
    rpc ModifyServiceSystemResources(stream buffer.Buffer) returns (stream buffer.Buffer) {} // ModifyServiceSystemResourcesInput -> ModifyServiceSystemResourcesOutput
    rpc Pack(stream buffer.Buffer) returns (stream buffer.Buffer) {} // bytes -> PackOutputServiceId | Service | Metadata | PackOutputError
    rpc GetServiceEstimatedCost(stream buffer.Buffer) returns (stream buffer.Buffer) {} // Metadata.HashTag.Hash & Service -> EstimatedCost
    rpc GetService(stream buffer.Buffer) returns (stream buffer.Buffer) {} // Metadata.HashTag.Hash -> Service
    rpc GetMetrics(stream buffer.Buffer) returns (stream buffer.Buffer) {} // TokenMessage -> Metrics
    rpc ServiceTunnel(stream buffer.Buffer) returns (stream buffer.Buffer) {} // TokenMessage | bytes -> bytes
}
